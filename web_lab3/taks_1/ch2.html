<!DOCTYPE html>
<script>
"use strict";
alert( 1 / 0 ); // Infinity
</script>

<!DOCTYPE html>
<script>
"use strict";
alert( Infinity ); // Infinity
</script>

<!DOCTYPE html>
<script>
"use strict";
alert( "not a number" / 2 ); // NaN, such division is erroneous
</script>

<!DOCTYPE html>
<script>
"use strict";
alert( NaN + 1 ); // NaN
alert( 3 * NaN ); // NaN
alert( "not a number" / 2 - 1 ); // NaN
</script>

<!DOCTYPE html>
<script>
"use strict";
let name = "John";
// embed a variable
alert( `Hello, ${name}!` ); // Hello, John!
// embed an expression
alert( `the result is ${1 + 2}` ); // the result is 3
</script>


<!DOCTYPE html>
<script>
"use strict";
// embed a variable
alert( `Hello, ${name}!` ); // Hello, John!
// embed an expression
alert( `the result is ${1 + 2}` ); // the result is 3
</script>


<!DOCTYPE html>
<script>
"use strict";
let isGreater = 4 > 1;
alert( isGreater ); // true (the comparison result is "yes")
</script>


<!DOCTYPE html>
<script>
"use strict";
let age;
alert(age); // shows "undefined"
</script>
