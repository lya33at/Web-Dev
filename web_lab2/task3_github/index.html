<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF=8">
        <title>Github Pricing</title>
        <link rel="stylesheet" href="styles.css">
    </head>
    <body>
        <main>
            <section class="hero">
                <h1>Try the Copilot-powered platform</h1>
                <p>Empower your development workflow with Github's AI-powered platform.</p>
                <button class="hero-btn">Start free for 30 days</button>
            </section>
            <section class="pricing">
                <div class="card">
                    <h2>Free</h2>
                    <p class="price">$0</p>
                    <p>For individuals</p>
                    <button>Join for free</button>
                </div>

                <div class="card">
                    <h2>Team</h2>
                    <p  class="price">$4</p>
                    <p>For teams</p>
                    <button>Continue with team</button>
                </div>

                <div class="card">
                    <h2>Enterprise</h2>
                    <p class="price">Contact us</p>
                    <p>For large organizations</p>
                    <button>Contact sales</button>
                </div>
            </section>
            <section class="addons">
                <h2>Additional add-ons</h2>
                <div class="addons-grid">
                    <div class="addon-card">GitHub Copilot</div>
                    <div class="addon-card">Advansed Security</div>
                    <div class="addon-card">Codespaces</div>
                    <div class="addon-card">Actions</div>
                    <div class="addon-card">Packages</div>
                    <div class="addon-card">Insights</div>
                </div>
            </section>
        </main>
    </body>
</html>
